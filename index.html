<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pessoa - CRUD</title>

    
    <script src="js/scripts_pessoas.js" defer type="module"></script>
    <link rel="stylesheet" href="css/style_pessoas.css">

</head>
<body>
    <div id="geral">
        <h3>Cadastro Aluno</h3>

        <div id="div-regras">
            <hr>
            <h4>Regras</h4>
            <p>Pessoas MENOR de Idade ou renda MENOR ou igual a R$ 1.700,00 são Isentas de desconto</p>
            <p>De R$ 1.701,00 até R$ 5.000,00 - Desconto de 5%</p>
            <p>De R$ 5.001,00 até R$ 8.000,00 - Desconto de 10%</p>
            <p>De R$ 8.001,00 até R$ 12.000,00 - Desconto de 15%</p>
            <p>Acima de R$ 12.000,00 - Desconto de 20%</p>
            <hr>
        </div>

        <div id="div-form-pessoa">
            <form id="form-pessoa">

                <label for="nome">Nome</label>
                <input type="text" name="nome" id="nome">

                <label for="idade">Idade</label>
                <input type="text" name="idade" id="idade">

                <label for="renda">Renda</label>
                <input type="text" name="renda" id="renda">

                <button type="submit" id="btn-add">Adicionar</button>
                <button type="reset" id="btn-limpar">Limpar</button>

            </form>
        </div>

<div id="div-lista-pessoas">

</div>
<div id="div-imagen"


    </div>
    
</body>
</html>
